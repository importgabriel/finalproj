spring.application.name=StayAnalytics
server.port=8080

# MySQL JDBC datasource (Docker MySQL 8). Update port/password if needed.
spring.datasource.url=jdbc:mysql://localhost:3306/stayanalytics?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

logging.level.org.springframework.security=INFO
logging.level.com.uga.stayanalytics=DEBUG
