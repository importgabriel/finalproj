<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign in')}"></head>
<body>
<header th:replace="~{fragments/layout :: topnav}"></header>

<main class="container">
    <div class="auth-card">
        <h1>Sign in</h1>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${info}"  class="alert alert-success" th:text="${info}"></div>

        <form th:action="@{/login}" method="post" class="form-stack" style="max-width:none;">
            <div class="form-row">
                <label for="username">Username</label>
                <input id="username" name="username" required autofocus/>
            </div>
            <div class="form-row">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required/>
            </div>
            <button class="btn btn-primary" type="submit">Sign in</button>
        </form>

        <div class="switch">
            New here? <a th:href="@{/signup}">Create an account</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
