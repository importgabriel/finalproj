<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Films')}"></head>
<body>
<header th:replace="~{fragments/layout :: topnav}"></header>

<main class="container">

    <form method="get" th:action="@{/search}" class="filter-bar">
        <span class="label">Browse by</span>
        <select name="year">
            <option value="">Year</option>
            <option th:each="y : ${#numbers.sequence(2025, 2010, -1)}"
                    th:value="${y}" th:text="${y}"
                    th:selected="${year != null and year == y}">2024</option>
        </select>
        <select name="genreId">
            <option value="">Genre</option>
            <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"
                    th:selected="${genreId != null and genreId == g.id}">Drama</option>
        </select>
        <select name="platformId">
            <option value="">Service</option>
            <option th:each="p : ${platforms}" th:value="${p.id}" th:text="${p.name}"
                    th:selected="${platformId != null and platformId == p.id}">Netflix</option>
        </select>
        <select name="type">
            <option value="">Type</option>
            <option value="Movie"  th:selected="${type == 'Movie'}">Movie</option>
            <option value="Series" th:selected="${type == 'Series'}">Series</option>
        </select>
        <span class="grow"></span>
        <span class="label">Find a film</span>
        <div class="find">
            <input type="text" name="title" placeholder="Search…" th:value="${title}"/>
            <button class="btn btn-primary" type="submit">Go</button>
        </div>
    </form>

    <div class="section-head">
        <h2>
            Results
            <span class="dim" style="margin-left: 8px; letter-spacing: 0.06em; text-transform: none;">
                — <span th:text="${#lists.size(results)}">0</span> films
            </span>
        </h2>
    </div>

    <div th:if="${#lists.isEmpty(results)}" class="muted center mt-4">
        No films match those filters.
    </div>

    <div class="poster-grid compact">
        <a th:each="m : ${results}" class="poster-card"
           th:href="@{'/movies/' + ${m.contentId}}">
            <div class="poster poster-mono"
                 th:classappend="'poster-mono-' + ${m.genreSlug} + ' shade-' + ${m.monogramShade}"
                 th:aria-label="${m.title}">
                <span th:text="${m.monogramInitial}">A</span>
                <span class="corner" th:text="${m.platformName}">Netflix</span>
            </div>
            <div class="meta">
                <div class="title" th:text="${m.title}">Title</div>
                <div class="sub">
                    <span th:text="${m.releaseYear}">2024</span>
                    · <span th:text="${m.platformName}">Netflix</span>
                </div>
            </div>
        </a>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
