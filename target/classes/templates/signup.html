<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create account')}"></head>
<body>
<header th:replace="~{fragments/layout :: topnav}"></header>

<main class="container">
    <div class="auth-card">
        <h1>Create account</h1>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/signup}" method="post" class="form-stack" style="max-width:none;">
            <div class="form-row">
                <label for="username">Username</label>
                <input id="username" name="username" th:value="${username}" required/>
            </div>
            <div class="form-row">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" th:value="${email}" required/>
            </div>
            <div class="form-row">
                <label for="password">Password <span class="dim small">— min 6 chars</span></label>
                <input id="password" type="password" name="password" minlength="6" required/>
            </div>
            <button class="btn btn-primary" type="submit">Create account</button>
        </form>

        <div class="switch">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
